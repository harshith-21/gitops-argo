apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/harshith-21/gitops-argo.git
    targetRevision: main
    path: nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true